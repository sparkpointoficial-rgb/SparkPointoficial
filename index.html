     <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkPoint | Official</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --admin-red: #ef4444;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        h1 { text-align: center; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.2rem; margin-bottom: 10px; }
        
        .card { 
            background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); margin-bottom: 20px;
        }

        button { 
            width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 600; cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; transition: 0.3s; margin-top: 10px;
        }
        button:hover { transform: scale(1.02); opacity: 0.9; }

        input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.2); border: 1px solid #334155; 
            border-radius: 12px; color: white; margin: 8px 0; box-sizing: border-box; font-size: 14px;
        }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-box span { font-size: 0.75rem; color: #94a3b8; display: block; margin-bottom: 5px; }
        .stat-box b { font-size: 1.1rem; color: var(--primary); }

        .ref-box { background: #020617; border: 1px dashed var(--primary); padding: 12px; border-radius: 12px; font-size: 0.8rem; word-break: break-all; cursor: pointer; text-align: center; color: #94a3b8; }

        #adminSection { display: none; border: 2px solid var(--admin-red); background: rgba(239, 68, 68, 0.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>SparkPoint</h1>
    
    <button id="connectBtn">🔌 Подключить MetaMask</button>
    <p id="walletAddr" style="text-align:center; font-size: 0.7rem; color: #64748b; margin-top: 5px;"></p>

    <div class="card">
        <h3 style="margin-top:0">📊 Личная Статистика</h3>
        <div class="stats">
            <div class="stat-box"><span>Уровень</span><b id="userLevel">-</b></div>
            <div class="stat-box"><span>Баланс</span><b id="userBalance">-</b></div>
            <div class="stat-box" style="grid-column: span 2;"><span>Всего рефералов</span><b id="directRefs">-</b></div>
        </div>
        <p style="font-size: 0.8rem; margin-bottom: 5px;">Ваша ссылка (нажми чтобы скопировать):</p>
        <div class="ref-box" id="refLinkText" onclick="copyRef()">Подключите кошелек...</div>
    </div>

    <div class="card">
        <h3 style="margin-top:0">🚀 Регистрация (0.05 BNB)</h3>
        <input type="text" id="refInput" placeholder="Адрес пригласителя (0x...)">
        <button onclick="register()">Активировать аккаунт</button>
    </div>

    <div id="adminSection" class="card">
        <h3 style="color: var(--admin-red); margin-top:0">🛠 Панель Управления</h3>
        <p style="font-size: 0.8rem; color: #94a3b8;">Добавление участника на 1 уровень бесплатно</p>
        <input type="text" id="newMemberAddr" placeholder="Кошелек нового участника">
        <input type="text" id="adminRefAddr" placeholder="Кошелек пригласителя">
        <button style="background: var(--admin-red);" onclick="adminAdd()">Добавить Бесплатно</button>
    </div>
</div>

<script>
    // АДРЕС ВАШЕГО КОНТРАКТА ВСТАВЛЕН:
    const CONTRACT_ADDRESS = "0x137cbBBb38962ABd3A3a0D212C1f408FBD92ffb8";
    
    const CONTRACT_ABI = [
        "function users(address) view returns (uint256 level, address referrer, uint256 internalBalance, uint256 referralsInLevel, uint256 totalDirectReferrals, bool exists)",
        "function register(address _referrer) external payable",
        "function adminAddUser(address _user, address _referrer) external",
        "function admin() view returns (address)"
    ];

    let provider, signer, contract;

    async function init() {
        if (!window.ethereum) return alert("Установите MetaMask!");
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        const address = await signer.getAddress();
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

        document.getElementById("walletAddr").innerText = "Кошелек: " + address;

        try {
            const owner = await contract.admin();
            if(address.toLowerCase() === owner.toLowerCase()) {
                document.getElementById("adminSection").style.display = "block";
            }
        } catch(e) { console.log("Ошибка проверки админа"); }

        const data = await contract.users(address);
        if (data.exists) {
            let uLvl = data.level.toNumber();
            document.getElementById("userLevel").innerText = uLvl;
            document.getElementById("userBalance").innerText = ethers.utils.formatEther(data.internalBalance) + " BNB";
            document.getElementById("directRefs").innerText = data.totalDirectReferrals;
            document.getElementById("refLinkText").innerText = window.location.origin + window.location.pathname + "?ref=" + address;
        } else {
            document.getElementById("userLevel").innerText = "0";
            document.getElementById("userBalance").innerText = "0";
            document.getElementById("directRefs").innerText = "0";
        }

        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('ref')) document.getElementById("refInput").value = urlParams.get('ref');
    }

    async function register() {
        try {
            const ref = document.getElementById("refInput").value || "0x0000000000000000000000000000000000000000";
            const tx = await contract.register(ref, { value: ethers.utils.parseEther("0.05") });
            await tx.wait();
            alert("Успех!");
            location.reload();
        } catch(e) { alert("Ошибка транзакции!"); }
    }

    async function adminAdd() {
        try {
            const user = document.getElementById("newMemberAddr").value;
            const ref = document.getElementById("adminRefAddr").value;
            const tx = await contract.adminAddUser(user, ref);
            await tx.wait();
            alert("Участник добавлен!");
        } catch(e) { alert("Ошибка! Только админ может это делать."); }
    }

    function copyRef() {
        const text = document.getElementById("refLinkText").innerText;
        if(text.includes("http")) {
            navigator.clipboard.writeText(text);
            alert("Ссылка скопирована!");
        }
    }

    document.getElementById("connectBtn").onclick = init;
</script>
</body>
</html>
