<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
        .btn { width: 100%; padding: 20px; margin-top: 20px; border-radius: 10px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }
        #admin { display: none; margin-top: 30px; padding: 20px; border: 3px solid red; border-radius: 15px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2>SparkPoint Admin</h2>
    <button class="btn" style="background: #007bff;" onclick="connect()">🔌 ПОДКЛЮЧИТЬ METAMASK</button>
    
    <div style="margin-top: 20px;">
        <p>Баланс: <b id="bal">-</b> BNB</p>
        <p id="addr" style="font-size: 10px; color: #555;"></p>
    </div>

    <div id="admin">
        <h2 style="color: red;">🛠 ПАНЕЛЬ УПРАВЛЕНИЯ</h2>
        <input type="text" id="u" placeholder="Адрес нового участника">
        <input type="text" id="r" placeholder="Адрес пригласителя">
        <button class="btn" style="background: red;" onclick="add()">ДОБАВИТЬ БЕСПЛАТНО</button>
    </div>

<script>
    const CA = "0x137cbBBb38962ABd3A3a0D212C1f408FBD92ffb8"; // Твой контракт
    const ABI = [
        "function admin() view returns (address)",
        "function adminAddUser(address _user, address _referrer) external",
        "function users(address) view returns (uint256 level, address referrer, uint256 internalBalance, uint256 referralsInLevel, uint256 totalDirectReferrals, bool exists)"
    ];

    let contract;

    async function connect() {
        if (!window.ethereum) return alert("ОТКРОЙ ЭТОТ САЙТ ВНУТРИ METAMASK!");
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            contract = new ethers.Contract(CA, ABI, signer);

            document.getElementById('addr').innerText = accounts[0];
            
            // Проверка админа (твой баланс 0,198 BNB)
            const boss = await contract.admin();
            if (accounts[0].toLowerCase() === boss.toLowerCase()) {
                document.getElementById('admin').style.display = 'block';
            }

            const info = await contract.users(accounts[0]);
            document.getElementById('bal').innerText = ethers.utils.formatEther(info.internalBalance);

        } catch (e) { alert("Ошибка: " + e.message); }
    }

    async function add() {
        try {
            const tx = await contract.adminAddUser(document.getElementById('u').value, document.getElementById('r').value);
            alert("Отправлено!");
            await tx.wait();
            alert("Участник добавлен!");
        } catch (e) { alert("Ошибка: " + e.message); }
    }
</script>
</body>
</html>
