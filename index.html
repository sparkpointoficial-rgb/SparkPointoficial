<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkPoint DApp</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; text-align: center; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: 20px auto; }
        button { background: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px; }
        button:hover { background: #0056b3; }
        input { padding: 10px; width: 80%; border: 1px solid #ddd; border-radius: 5px; margin: 5px; }
        .admin-panel { border: 2px solid #ff4757; background: #fff5f5; }
    </style>
</head>
<body>

    <h1>SparkPoint Platform</h1>
    <button id="connectBtn">Подключить кошелек</button>
    
    <div class="card">
        <h2>Личный кабинет</h2>
        <p>Ваш уровень: <b id="userLevel">0</b></p>
        <p>Ваш баланс: <b id="userBalance">0</b> BNB</p>
        <p>Прямых рефералов: <b id="directRefs">0</b></p>
        
        <p>Ваша реферальная ссылка:</p>
        <input type="text" id="refLink" readonly onclick="this.select()">
    </div>

    <div class="card">
        <h2>Регистрация (0.05 BNB)</h2>
        <input type="text" id="refInput" placeholder="Адрес пригласителя">
        <button onclick="register()">Вступить</button>
    </div>

    <div class="card admin-panel">
        <h3>Админ-панель</h3>
        <input type="text" id="newMemberAddr" placeholder="Кошелек участника">
        <input type="text" id="adminRefAddr" placeholder="Кошелек пригласителя">
        <button onclick="adminAdd()">Добавить бесплатно (Level 1)</button>
    </div>

    <script>
        const CONTRACT_ADDRESS = "ВАШ_АДРЕС_ПОСЛЕ_ДЕПЛОЯ";
        const CONTRACT_ABI = [
            "function users(address) view returns (uint256 level, address referrer, uint256 internalBalance, uint256 referralsInLevel, uint256 totalDirectReferrals, bool exists)",
            "function register(address _referrer) external payable",
            "function adminAddUser(address _user, address _referrer) external",
            "function admin() view returns (address)"
        ];

        let provider, signer, contract;

        async function init() {
            if (!window.ethereum) return alert("Нужен MetaMask");
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
            
            const userAddr = await signer.getAddress();
            loadUserData(userAddr);
            
            // Настройка реф ссылки
            document.getElementById("refLink").value = window.location.origin + "?ref=" + userAddr;

            // Если зашли по ссылке, вставляем реф в поле регистрации
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('ref')) document.getElementById("refInput").value = urlParams.get('ref');
        }

        async function loadUserData(addr) {
            const data = await contract.users(addr);
            if (data.exists) {
                document.getElementById("userLevel").innerText = data.level;
                document.getElementById("userBalance").innerText = ethers.utils.formatEther(data.internalBalance);
                document.getElementById("directRefs").innerText = data.totalDirectReferrals;
            }
        }

        async function register() {
            const ref = document.getElementById("refInput").value || "0x0000000000000000000000000000000000000000";
            const tx = await contract.register(ref, { value: ethers.utils.parseEther("0.05") });
            await tx.wait();
            alert("Успешно!");
        }

        async function adminAdd() {
            const user = document.getElementById("newMemberAddr").value;
            const ref = document.getElementById("adminRefAddr").value;
            const tx = await contract.adminAddUser(user, ref);
            await tx.wait();
            alert("Участник добавлен!");
        }

        document.getElementById("connectBtn").onclick = init;
    </script>
</body>
</html>
