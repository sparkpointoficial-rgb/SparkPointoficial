<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkPoint | Official</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
    <style>
        :root {
            --primary: #007bff;
            --accent: #00d2ff;
            --admin-color: #ff4757;
            --bg: #121212;
            --card-bg: #1e1e1e;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        .card { 
            background: var(--card-bg); border-radius: 20px; padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px;
            border: 1px solid #333;
        }

        h1 { background: linear-gradient(45deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5em; }
        
        button { 
            background: linear-gradient(45deg, var(--primary), var(--accent)); 
            color: white; border: none; padding: 15px 30px; border-radius: 12px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,123,255,0.4); }

        input { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; 
            border: 1px solid #444; background: #252525; color: white; box-sizing: border-box;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-item { background: #252525; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .stat-item span { display: block; font-size: 0.8em; color: #888; }
        .stat-item b { font-size: 1.2em; color: var(--accent); }

        #adminSection { display: none; border: 2px solid var(--admin-color); }
        .ref-link-box { background: #111; padding: 10px; border-radius: 8px; border: 1px dashed var(--accent); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>SparkPoint</h1>
    
    <button id="connectBtn">🔌 Подключить MetaMask</button>
    <p id="walletAddr" style="font-size: 0.8em; color: #888;"></p>

    <div class="card">
        <h3>📊 Ваша Статистика</h3>
        <div class="stats-grid">
            <div class="stat-item"><span>Уровень</span><b id="userLevel">0</b></div>
            <div class="stat-item"><span>Баланс</span><b id="userBalance">0</b></div>
            <div class="stat-item" style="grid-column: span 2;"><span>Рефералы</span><b id="directRefs">0</b></div>
        </div>
        
        <p>🔗 Реферальная ссылка:</p>
        <div class="ref-link-box" onclick="copyRef()">
            <span id="refLinkText">Сначала подключите кошелек</span>
        </div>
    </div>

    <div class="card">
        <h3>🚀 Вступить (0.05 BNB)</h3>
        <input type="text" id="refInput" placeholder="Адрес пригласителя (0x...)">
        <button onclick="register()">Активировать аккаунт</button>
    </div>

    <div id="adminSection" class="card">
        <h3 style="color: var(--admin-color);">🛠 Админ-панель</h3>
        <input type="text" id="newMemberAddr" placeholder="Кошелек нового участника">
        <input type="text" id="adminRefAddr" placeholder="Кошелек пригласителя">
        <button style="background: var(--admin-color);" onclick="adminAdd()">Добавить бесплатно</button>
    </div>
</div>

<script>
    const CONTRACT_ADDRESS = "ВАШ_АДРЕС_ПОСЛЕ_ДЕПЛОЯ";
    const CONTRACT_ABI = [
        "function users(address) view returns (uint256 level, address referrer, uint256 internalBalance, uint256 referralsInLevel, uint256 totalDirectReferrals, bool exists)",
        "function register(address _referrer) external payable",
        "function adminAddUser(address _user, address _referrer) external",
        "function admin() view returns (address)"
    ];

    let provider, signer, contract;

    async function init() {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        const address = await signer.getAddress();
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

        document.getElementById("walletAddr").innerText = address;
        
        // Проверка на админа
        const adminAddr = await contract.admin();
        if(address.toLowerCase() === adminAddr.toLowerCase()) {
            document.getElementById("adminSection").style.display = "block";
        }

        // Загрузка данных
        const data = await contract.users(address);
        if (data.exists) {
            document.getElementById("userLevel").innerText = data.level;
            document.getElementById("userBalance").innerText = ethers.utils.formatEther(data.internalBalance) + " BNB";
            document.getElementById("directRefs").innerText = data.totalDirectReferrals;
            
            const link = window.location.origin + window.location.pathname + "?ref=" + address;
            document.getElementById("refLinkText").innerText = link;
        }
    }

    function copyRef() {
        const text = document.getElementById("refLinkText").innerText;
        navigator.clipboard.writeText(text);
        alert("Ссылка скопирована!");
    }

    // ... функции register и adminAdd остаются такими же, как раньше ...
    document.getElementById("connectBtn").onclick = init;
</script>

</body>
</html>
